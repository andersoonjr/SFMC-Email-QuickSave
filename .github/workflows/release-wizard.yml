name: Release with AI and Wizard Spells

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write
  models: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag and diff
        id: info
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            FIRST_COMMIT=$(git log --pretty=format:%H | tail -1)
            RANGE="$FIRST_COMMIT..HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          DIFF_SUMMARY=$(git diff $RANGE --compact-summary)
          COMMITS=$(git log $RANGE --pretty=format:"- %s" --no-merges)
          {
            echo "diff_summary<<EOF"
            echo "$DIFF_SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Extract version from manifest.json
        id: manifest_version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: AI version bump decision
        id: ai_bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="You are an expert in semantic versioning.
          Analyze the code changes below and classify the release as:
          - 'major' if there are breaking changes,
          - 'minor' if there are new features while maintaining compatibility,
          - 'patch' if there are only bug fixes, refactorings, or minor adjustments.
          Answer ONLY with one word: major, minor or patch.

          Diff summary:
          ${{ steps.info.outputs.diff_summary }}

          Commit messages:
          ${{ steps.info.outputs.commits }}"
          JSON_PAYLOAD=$(jq -n \
            --arg model "gpt-4o-mini" \
            --arg prompt "$PROMPT" \
            '{
               model: $model,
               messages: [{role: "user", content: $prompt}],
               temperature: 0.1,
               max_tokens: 10
             }')
          RESPONSE=$(curl -s -X POST https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")
          BUMP=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' | tr '[:upper:]' '[:lower:]' | grep -oE 'major|minor|patch' | head -1)
          if [ -z "$BUMP" ]; then
            BUMP="patch"
          fi
          echo "type=$BUMP" >> $GITHUB_OUTPUT

      - name: AI generate release notes
        id: ai_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="You are a technical writer specialized in release notes for software extensions.
          Based on the changes below, write a release note in the following format:

          What's New:
          **Short title:** Detailed description of the change from the user's perspective.
          **Another title:** Description...

          Rules:
          - Do NOT mention file names, variable names, or code.
          - Focus on features, refactorings, UI, performance, bug fixes.
          - Use professional and clear English.
          - Be specific about what changed, without exposing internal details.

          Changes:
          ${{ steps.info.outputs.diff_summary }}
          ${{ steps.info.outputs.commits }}"
          JSON_PAYLOAD=$(jq -n \
            --arg model "gpt-4o-mini" \
            --arg prompt "$PROMPT" \
            '{
               model: $model,
               messages: [{role: "user", content: $prompt}],
               temperature: 0.6,
               max_tokens: 1200
             }')
          RESPONSE=$(curl -s -X POST https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")
          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // ""')
          if [ -z "$NOTES" ] || [ "$NOTES" = "null" ]; then
            echo "AI unavailable – falling back to GitHub automatic notes"
            NOTES=$(gh api -X POST /repos/$GITHUB_REPOSITORY/releases/generate-notes \
              -f tag_name="${{ steps.manifest_version.outputs.version }}" \
              -f target_commitish="$GITHUB_SHA" \
              --jq '.body' 2>/dev/null || echo "Automatic release.")
          fi
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Generate release name (Wizard spells, no repeats)
        id: spell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPELLS=(
            "Accio"
            "Aguamenti"
            "Alohomora"
            "Anapneo"
            "Aparecium"
            "Apparate"
            "Aqua Eructo"
            "Arania Exumai"
            "Arresto Momentum"
            "Avada Kedavra"
            "Avis"
            "Bombarda"
            "Brackium Emendo"
            "Calvorio"
            "Cantis"
            "Cave Inimicum"
            "Colloportus"
            "Confringo"
            "Confundo"
            "Crucio"
            "Cushioning"
            "Deletrius"
            "Densaugeo"
            "Deprimo"
            "Depulso"
            "Descendo"
            "Diffindo"
            "Dissendium"
            "Duro"
            "Engorgio"
            "Ennervate"
            "Entrail-Expelling"
            "Episkey"
            "Erecto"
            "Evanesco"
            "Expecto Patronum"
            "Expelliarmus"
            "Ferula"
            "Fidelius"
            "Fiendfyre"
            "Finestra"
            "Finite Incantatem"
            "Flagrante"
            "Flagrate"
            "Flame-Freezing"
            "Flipendo"
            "Furnunculus"
            "Geminio"
            "Glacius"
            "Homenum Revelio"
            "Homorphus"
            "Horcrux"
            "Immobulus"
            "Imperio"
            "Impervius"
            "Incarcerous"
            "Incendio"
            "Legilimens"
            "Levicorpus"
            "Liberacorpus"
            "Locomotor Mortis"
            "Lumos"
            "Lumos Solem"
            "Meteolojinx"
            "Mimblewimble"
            "Morsmordre"
            "Muffliato"
            "Nox"
            "Obliviate"
            "Obscuro"
            "Oppugno"
            "Orchideous"
            "Pack"
            "Petrificus Totalus"
            "Piertotum Locomotor"
            "Plumifume"
            "Portus"
            "Priori Incantatem"
            "Protego"
            "Protego Horribilis"
            "Protego Maxima"
            "Quietus"
            "Reducio"
            "Reducto"
            "Relashio"
            "Rennervate"
            "Reparo"
            "Repello"
            "Repello Muggletum"
            "Revelio"
            "Rictusempra"
            "Riddikulus"
            "Salvio Hexia"
            "Scourgify"
            "Sectumsempra"
            "Serpensortia"
            "Silencio"
            "Sonorus"
            "Stupefy"
            "Tarantallegra"
            "Tergeo"
            "Unbreakable Vow"
            "Waddiwasi"
            "Wingardium Leviosa"
          )
          echo "Fetching existing releases count..."
          RELEASES_COUNT=$(gh api /repos/$GITHUB_REPOSITORY/releases --paginate --jq 'length' | awk '{s+=$1} END {print s}')
          echo "Total releases so far: $RELEASES_COUNT"
          INDEX=$RELEASES_COUNT
          TOTAL_SPELLS=${#SPELLS[@]}
          if [ $INDEX -ge $TOTAL_SPELLS ]; then
            echo "ERROR: All 100 spells have been used! Add new ones to the list or reset the index."
            exit 1
          fi
          SPELL="${SPELLS[$INDEX]}"
          RELEASE_NAME="${SPELL} Update"
          echo "Release name: $RELEASE_NAME"
          echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest_version.outputs.version }}
          name: ${{ steps.spell.outputs.name }}
          body: ${{ steps.ai_notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
